name: Build and deploy to OVH

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}

      - name: Deploy
        env:
          SFTP_HOST: ${{ secrets.OVH_SFTP_HOST }}
          SFTP_USER: ${{ secrets.OVH_SFTP_USER }}
          SFTP_PASSWORD: ${{ secrets.OVH_SFTP_PASSWORD }}
          SFTP_PATH: ${{ secrets.OVH_SFTP_PATH }}
        run: |
          lftp -c "
            set sftp:auto-confirm yes;
            set net:max-retries 2;
            set net:timeout 30;
            open -u '$SFTP_USER','$SFTP_PASSWORD' sftp://$SFTP_HOST;
            mirror --reverse --delete --verbose --parallel=4 out/ '$SFTP_PATH';
          "